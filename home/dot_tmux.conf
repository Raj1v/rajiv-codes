# tmux configuration

# Change prefix to Ctrl+F
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# Vi mode for copy-mode and command prompts
set -g mode-keys vi

# Fix scrolling issues with splits
set -ga terminal-overrides ',*:smcup@:rmcup@'
set -g mouse on

# Pane switching (triggered by iTerm2 CMD+[ and CMD+])
bind -n M-p select-pane -t :.-
bind -n M-n select-pane -t :.+

# Show help in a popup instead of taking over the terminal
bind-key ? display-popup -h 90% -w 90% -E "tmux list-keys -N | less"

# Open new panes/windows in the current directory
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# Toggle status bar with prefix + b
bind-key b set-option status

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'thallada/tmux-resurrect#coding-agent-session-restore'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# Create new named session (detached)
bind-key N command-prompt -p "New session name:" "new-session -d -s '%%'"

# Workmux
bind C-s display-popup -h 80% -w 80% -E "workmux dashboard"

# Sesh session picker
set -g detach-on-destroy off
bind-key T run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
  --no-sort --ansi --border-label ' sesh ' --prompt '⚡ ' \
  --header ' ^a all ^t tmux ^g configs ^x zoxide ^d kill ^f find' \
  --bind 'tab:down,btab:up' \
  --bind 'ctrl-a:change-prompt(⚡ )+reload(sesh list --icons)' \
  --bind 'ctrl-t:change-prompt(🪟 )+reload(sesh list -t --icons)' \
  --preview-window 'right:55%' \
  --preview 'sesh preview {}'
)\""
bind-key K display-popup -E -w 40% "sesh connect \"$(
  sesh list -i | gum filter --limit 1 --no-sort --fuzzy --no-strip-ansi --placeholder 'Pick a sesh' --height 50 --prompt='⚡'
)\""

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
