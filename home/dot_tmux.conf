# tmux configuration

# Change prefix to Ctrl+F
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# Vi mode for copy-mode and command prompts
set -g mode-keys vi

# Pass SSH env vars into new tmux sessions/windows
set -ga update-environment "LC_SSH_HOST LC_THEME"

# Fix scrolling issues with splits
set -ga terminal-overrides ',*:smcup@:rmcup@'
set -ga terminal-overrides ',*:Tc'
set -as terminal-features ',xterm-256color:RGB:osc7'
set -as terminal-features ',*:hyperlinks'
set -g mouse on

# Pane switching (triggered by wezterm CMD+[ and CMD+])
bind -n M-p select-pane -t :.-
bind -n M-n select-pane -t :.+

# Vim-style pane switching (triggered by wezterm CMD+HJKL)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# 1-index panes and windows so Opt+N matches the displayed number
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Don't flip the window name to "[tmux]" while in copy-mode/scroll
set -g automatic-rename-format "#{pane_current_command}#{?pane_dead,[dead],}"

# Override default prefix+N → select-window so missing windows fail silently
# instead of flashing "can't find window: N" in the status bar.
bind-key 1 if -F "#{W:#{?#{==:#{window_index},1},x,}}" "select-window -t :1"
bind-key 2 if -F "#{W:#{?#{==:#{window_index},2},x,}}" "select-window -t :2"
bind-key 3 if -F "#{W:#{?#{==:#{window_index},3},x,}}" "select-window -t :3"
bind-key 4 if -F "#{W:#{?#{==:#{window_index},4},x,}}" "select-window -t :4"
bind-key 5 if -F "#{W:#{?#{==:#{window_index},5},x,}}" "select-window -t :5"
bind-key 6 if -F "#{W:#{?#{==:#{window_index},6},x,}}" "select-window -t :6"
bind-key 7 if -F "#{W:#{?#{==:#{window_index},7},x,}}" "select-window -t :7"
bind-key 8 if -F "#{W:#{?#{==:#{window_index},8},x,}}" "select-window -t :8"
bind-key 9 if -F "#{W:#{?#{==:#{window_index},9},x,}}" "select-window -t :9"

# Direct pane select by number (Opt+1..9, remapped from macOS ¡™£ by wezterm)
bind -n M-1 select-pane -t :.1
bind -n M-2 select-pane -t :.2
bind -n M-3 select-pane -t :.3
bind -n M-4 select-pane -t :.4
bind -n M-5 select-pane -t :.5
bind -n M-6 select-pane -t :.6
bind -n M-7 select-pane -t :.7
bind -n M-8 select-pane -t :.8
bind -n M-9 select-pane -t :.9

# Keep prefix+q number overlay up longer, match border colours
set -g display-panes-time 2000
set -g display-panes-active-colour colour39
set -g display-panes-colour colour245

# Show help in a popup instead of taking over the terminal
bind-key ? display-popup -h 90% -w 90% -E "tmux list-keys -N | less"

# Open new panes/windows in the current directory
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# Kill pane / window without confirmation
bind-key x kill-pane
bind-key X kill-window

# Toggle status bar with prefix + b
bind-key b set-option status

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'thallada/tmux-resurrect#coding-agent-session-restore'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'catppuccin/tmux'
set -g @fzf-url-open "$HOME/bin/open-url"
# OSC 8-aware URL picker (prefix + H) — tmux-fzf-url's xre --strip-ansi swallows hyperlink URLs.
bind-key H run -b "$HOME/bin/tmux-osc8-url"
set -g allow-passthrough on
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# Create new named session (detached)
bind-key N command-prompt -p "New session name:" "new-session -s '%%'"

# Workmux
bind C-s display-popup -h 80% -w 80% -E "workmux dashboard"

# Sesh session picker
set -g detach-on-destroy off
bind-key T run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
  --no-sort --ansi --border-label ' sesh ' --prompt '⚡ ' \
  --header ' ^a all ^t tmux ^g configs ^x zoxide ^d kill ^f find' \
  --bind 'tab:down,btab:up' \
  --bind 'ctrl-a:change-prompt(⚡ )+reload(sesh list --icons)' \
  --bind 'ctrl-t:change-prompt(🪟 )+reload(sesh list -t --icons)' \
  --preview-window 'right:55%' \
  --preview 'sesh preview {}'
)\""
bind-key K display-popup -E -w 40% "sesh connect \"$(
  sesh list -i | gum filter --limit 1 --no-sort --fuzzy --no-strip-ansi --placeholder 'Pick a sesh' --height 50 --prompt='⚡'
)\""

# Pane borders — make active pane obvious
set -g pane-border-lines heavy
set -g pane-border-indicators both
set -g pane-border-status top
# pane-border-style / format use catppuccin colors — set after TPM loads (see bottom)

# Catppuccin palette only — flavor tracks LC_THEME, window/status formatting is hand-rolled below
if-shell '[ "$LC_THEME" = light ]' \
  'set -g @catppuccin_flavor "latte"' \
  'set -g @catppuccin_flavor "mocha"'
# Disable catppuccin's two-tone window tabs — we draw our own single-color badges
set -g @catppuccin_window_status_style "none"
# Transparent bar — inherits terminal (wezterm) background so the bar blends with the canvas
set -g @catppuccin_status_background "none"

set -g status-position top
set -g status-justify left
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100

# status-left / status-right wired in AFTER TPM runs (see bottom)

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'

# Pane borders + status badges — must come after catppuccin's palette is loaded by TPM
set -gF pane-border-style "fg=#{@thm_surface_2}"
set -gF pane-active-border-style "fg=#{@thm_teal}"
# Use set -g (no F) so #{?pane_active,...}, #P, #T evaluate per-pane at render time.
# Inactive bg uses subtext_1 — near-black in latte, near-white in mocha — for
# strong canvas separation in either flavor.
set -g pane-border-format "#{?pane_active,#[fg=#{@thm_crust}#,bg=#{@thm_teal}] [#P] #T #[default],#[fg=#{@thm_bg}#,bg=#{@thm_subtext_1}] [#P] #T #[default]}"

# Hand-rolled rounded single-color badges.   are nerd-font half-circle endcaps.
# Each badge: one bg color + one fg color, no internal seams.

# Window tabs: subtle when inactive, mauve when active.
# Note: -gF expands #{@thm_*} at set-time; we escape ##W/##I/##{?...} so they
# survive set-time and are re-expanded per-window at render-time.
set -g window-status-separator " "
set -gF window-status-format \
  "#[fg=#{@thm_surface_0},bg=default]#[fg=#{@thm_subtext_0},bg=#{@thm_surface_0}] ##I  ##W ##{?@workmux_status, ##{@workmux_status},}#[fg=#{@thm_surface_0},bg=default]"
set -gF window-status-current-format \
  "#[fg=#{@thm_teal},bg=default]#[fg=#{@thm_crust},bg=#{@thm_teal},bold] ##I  ##W##{?window_zoomed_flag, 󰁌,} ##{?@workmux_status, ##{@workmux_status},}#[fg=#{@thm_teal},bg=default]"

# Status-left: session badge (blue) — bright accent on the left
set -gF status-left \
  "#[fg=#{@thm_blue},bg=default]#[fg=#{@thm_crust},bg=#{@thm_blue},bold] ##S #[fg=#{@thm_blue},bg=default] "

# Status-right: SSH RTT (subtle, no badge) + time badge (surface)
set -gF status-right \
  "#[fg=#{@thm_subtext_0},bg=default]##(~/bin/tmux-ssh-rtt) #[fg=#{@thm_surface_0},bg=default]#[fg=#{@thm_fg},bg=#{@thm_surface_0}] %H:%M %d-%b #[fg=#{@thm_surface_0},bg=default]"

# Workmux installs its own per-window window-status-{,current-}format at session/window create time.
# Clear those so our global formats above are what's actually rendered.
run-shell -b "tmux list-windows -a -F '##{session_name}:##{window_index}' | while read w; do tmux set-option -uwt \"\$w\" window-status-format 2>/dev/null; tmux set-option -uwt \"\$w\" window-status-current-format 2>/dev/null; done"
