# tmux configuration

# Change prefix to Ctrl+F
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# Fix scrolling issues with splits
set -ga terminal-overrides ',*:smcup@:rmcup@'
set -g mouse on

# Pane switching (triggered by iTerm2 CMD+[ and CMD+])
bind -n M-p select-pane -t :.-
bind -n M-n select-pane -t :.+

# Show help in a popup instead of taking over the terminal
bind-key ? display-popup -h 90% -w 90% -E "tmux list-keys -N | less"

# Open new panes/windows in the current directory
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# Toggle status bar with prefix + b
bind-key b set-option status

# Pane styling
set-window-option -g window-style 'bg=#101010'
set-window-option -g window-active-style 'bg=#151515'
set -g pane-border-style fg=colour238,bg=#101010
set -g pane-active-border-style fg=colour113,bg=#151515

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Workmux
bind C-s display-popup -h 30 -w 100 -E "workmux dashboard"

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
